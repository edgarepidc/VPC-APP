# Aplica migraciones Prisma contra la base configurada en el secreto DATABASE_URL.
# Configura en GitHub: Settings → Secrets and variables → Actions → DATABASE_URL
# (cadena postgresql://... de Supabase, con ?sslmode=require recomendado).
#
# Se ejecuta: (1) al hacer push a main si cambia prisma/, (2) manualmente desde la pestaña Actions.

name: Database migrate

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "prisma/**"

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Falta el secreto DATABASE_URL en GitHub Actions (Settings → Secrets)."
            exit 1
          fi
          npx prisma migrate deploy
