# Aplica migraciones Prisma contra la base configurada en el secreto DATABASE_URL.
# Configura en GitHub: Settings → Secrets and variables → Actions → DATABASE_URL
#
# Se ejecuta: (1) al hacer push a main si cambia prisma/, (2) manualmente desde Actions.

name: Database migrate

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "prisma/**"

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Comprobar DATABASE_URL (sin exponer el valor)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Falta el secreto DATABASE_URL. Repo → Settings → Secrets and variables → Actions → New repository secret (nombre exacto: DATABASE_URL). Usa la misma URI de Postgres que en Vercel Production."
            exit 1
          fi
          echo "::notice::DATABASE_URL está definida."
          if ! printf '%s' "$DATABASE_URL" | grep -qiE '^postgres(ql)?://'; then
            echo "::error::DATABASE_URL debe empezar por postgresql:// o postgres://"
            exit 1
          fi
          if printf '%s' "$DATABASE_URL" | grep -qE 'db\.[^/]+\.supabase\.co:5432'; then
            echo "::warning::DATABASE_URL usa host directo db.*.supabase.co:5432. GitHub Actions suele fallar con P1001. Usa el pooler de Supabase (Session :5432 o Transaction :6543 según abajo)."
          fi
          if printf '%s' "$DATABASE_URL" | grep -qE ':6543'; then
            echo "::warning::Puerto 6543 = pooler en modo TRANSACCIÓN. «prisma migrate deploy» a veces se queda colgado sin más salida. Para este workflow, pon en el secreto la URI «Session pooler» (mismo host *.pooler.supabase.com, puerto 5432). En Vercel la app puede seguir con 6543."
          fi

      - name: Prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Evita jobs colgados 30+ min si el pooler transaccional no coopera con migraciones
          set +e
          timeout 300 npx prisma migrate deploy
          code=$?
          set -e
          if [ "$code" -eq 124 ]; then
            echo "::error::Timeout (5 min). Suele pasar con Transaction pooler (:6543). Usa Session pooler (:5432) en el secreto DATABASE_URL de Actions y reintenta."
            exit 1
          fi
          exit "$code"
