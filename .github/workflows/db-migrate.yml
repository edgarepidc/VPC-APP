# Aplica migraciones Prisma contra la base configurada en el secreto DATABASE_URL.
# Configura en GitHub: Settings → Secrets and variables → Actions → DATABASE_URL
#
# Se ejecuta: (1) al hacer push a main si cambia prisma/, (2) manualmente desde Actions.

name: Database migrate

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "prisma/**"

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Comprobar DATABASE_URL (sin exponer el valor)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Falta el secreto DATABASE_URL. Repo → Settings → Secrets and variables → Actions → New repository secret (nombre exacto: DATABASE_URL). Usa la misma URI de Postgres que en Vercel Production."
            exit 1
          fi
          echo "::notice::DATABASE_URL está definida."
          if ! printf '%s' "$DATABASE_URL" | grep -qiE '^postgres(ql)?://'; then
            echo "::error::DATABASE_URL debe empezar por postgresql:// o postgres://"
            exit 1
          fi

      - name: Prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy
